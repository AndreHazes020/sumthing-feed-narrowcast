<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sumthing Impact News</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/@mux/mux-player@3/dist/mux-player.css">
  <script defer src="https://unpkg.com/@mux/mux-player@3"></script>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #033532;
      --highlight: #C7F50A;
      --text: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.6);
    }

    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* Loading screen */
    .loading-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      z-index: 1000;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }

    .loading-screen.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255, 255, 255, 0.15);
      border-top-color: var(--highlight);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .loading-text {
      margin-top: 1.5rem;
      font-size: 1.1rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Carousel container */
    .carousel {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* Individual slide - fullscreen */
    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      visibility: hidden;
      transition: none;
    }

    .slide.active {
      opacity: 1;
      visibility: visible;
      z-index: 2;
    }

    .slide.entering {
      animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .slide.exiting {
      animation: slideOut 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      z-index: 1;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: scale(1.02);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes slideOut {
      from {
        opacity: 1;
        transform: scale(1);
      }
      to {
        opacity: 0;
        transform: scale(0.98);
      }
    }

    /* Media section - fullscreen background */
    .slide-media {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background: #000;
    }

    .slide-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .slide-media .image-gallery {
      position: absolute;
      inset: 0;
    }

    .slide-media .image-gallery img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 1.2s ease;
    }

    .slide-media .image-gallery img.gallery-active {
      opacity: 1;
    }

    /* Gallery counter */
    .gallery-counter {
      position: absolute;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(8px);
      padding: 0.3rem 0.75rem;
      border-radius: 6px;
      font-size: 0.8rem;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      z-index: 5;
    }

    /* Video styles */
    .slide-media mux-player {
      width: 100%;
      height: 100%;
      --controls: none;
      --media-object-fit: cover;
    }

    /* Bottom gradient overlay for text readability */
    .slide-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(3, 53, 50, 0.95) 0%,
        rgba(3, 53, 50, 0.85) 25%,
        rgba(3, 53, 50, 0.4) 50%,
        transparent 70%
      );
      pointer-events: none;
      z-index: 3;
    }

    /* Content overlay - positioned at bottom */
    .slide-content {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 4;
      padding: 0 3rem 4.5rem;
      max-height: 65vh;
      overflow-y: auto;
      scrollbar-width: none;
    }

    .slide-content::-webkit-scrollbar {
      display: none;
    }

    /* Video text slide-away animation */
    .slide-content.video-text-hide {
      animation: slideTextAway 1s ease-in forwards;
    }

    @keyframes slideTextAway {
      0% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(100%); }
    }

    .slide-content.video-text-hide ~ .slide-overlay {
      animation: fadeOverlay 1s ease-in forwards;
    }

    @keyframes fadeOverlay {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }

    .category-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.35rem 0.85rem;
      background: rgba(199, 245, 10, 0.15);
      color: var(--highlight);
      border: 1px solid rgba(199, 245, 10, 0.3);
      border-radius: 999px;
      font-family: 'Oswald', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 1rem;
      width: fit-content;
      backdrop-filter: blur(8px);
    }

    .category-badge::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--highlight);
      border-radius: 50%;
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .story-title {
      font-family: 'Oswald', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 1rem;
      color: var(--text);
      text-transform: uppercase;
      max-width: 800px;
    }

    .partner-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .partner-logo {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
      border: none;
      background: #fff;
      flex-shrink: 0;
    }

    .partner-logo-placeholder {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: 0.75rem;
      color: var(--bg);
      border: none;
      flex-shrink: 0;
    }

    .partner-info {
      display: flex;
      flex-direction: column;
    }

    .partner-name {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text);
    }

    .publish-date {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 0.15rem;
    }

    .news-text {
      font-family: 'DM Sans', sans-serif;
      font-size: 1.05rem;
      line-height: 1.7;
      color: var(--text);
      max-width: 800px;
      white-space: pre-wrap;
      word-wrap: break-word;
      display: -webkit-box;
      -webkit-line-clamp: 6;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .supporter-count {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-top: 1rem;
      padding: 0.4rem 0.85rem;
      background: rgba(199, 245, 10, 0.1);
      border-radius: 999px;
      backdrop-filter: blur(8px);
    }

    .supporter-count svg {
      width: 16px;
      height: 16px;
      fill: var(--highlight);
    }

    .supporter-count strong {
      color: var(--highlight);
      font-weight: 700;
    }

    /* Progress bar */
    .progress-bar-container {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: rgba(255, 255, 255, 0.08);
      z-index: 100;
    }

    .progress-bar {
      height: 100%;
      background: var(--highlight);
      width: 0%;
      transition: width 0.3s linear;
      border-radius: 0 2px 2px 0;
    }

    /* Slide indicators */
    .slide-indicators {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 100;
    }

    .indicator {
      width: 32px;
      height: 4px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.2);
      transition: all 0.4s ease;
      cursor: pointer;
    }

    .indicator.active {
      background: var(--highlight);
      width: 48px;
    }

    /* Slide counter */
    .slide-counter {
      position: fixed;
      top: 24px;
      right: 32px;
      font-family: 'Oswald', sans-serif;
      font-size: 0.85rem;
      color: var(--text-muted);
      z-index: 100;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* Logo / branding */
    .branding {
      position: fixed;
      top: 24px;
      left: 32px;
      display: flex;
      align-items: center;
      z-index: 100;
    }

    .brand-logo {
      height: 40px;
      width: auto;
    }

    /* No-media slide: colored background with centered text */
    .slide.no-media {
      background: var(--bg);
    }

    .slide.no-media .slide-content {
      max-height: 80vh;
    }

    .slide.no-media .news-text {
      font-size: 1.2rem;
      -webkit-line-clamp: 10;
    }

    .slide.no-media .story-title {
      font-size: 2.5rem;
    }

    /* Error state */
    .error-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      z-index: 1000;
    }

    .error-screen h2 {
      font-family: 'Oswald', sans-serif;
      font-size: 1.5rem;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      color: var(--text);
    }

    .error-screen p {
      color: var(--text-muted);
      margin-bottom: 1.5rem;
    }

    .error-screen button {
      padding: 0.65rem 1.5rem;
      background: var(--highlight);
      color: var(--bg);
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .error-screen button:hover {
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <div class="loading-screen" id="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading impact updates...</div>
  </div>

  <div class="branding">
    <img class="brand-logo" src="https://cdn.prod.website-files.com/64c28276d2b840e5d9b7d9a4/66f6cd36c788b6f03fe23c26_SUMTHING.LOGO.ULTRALIME.png" alt="Sumthing">
  </div>

  <div class="slide-counter" id="slideCounter"></div>

  <div class="carousel" id="carousel"></div>

  <div class="slide-indicators" id="indicators"></div>

  <div class="progress-bar-container">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <script>
    const API_BASE = 'https://sumthing-api.com';
    const PROJECTS_URL = `${API_BASE}/v3/projects`;
    const NEWS_URL = `${API_BASE}/v1/stories/news`;
    const SLIDE_DURATION = 10000;
    const GALLERY_INTERVAL = 3500;
    const FETCH_TIMEOUT = 30000;
    const MAX_RETRIES = 3;
    const INITIAL_PAGE_SIZE = 6;
    const FULL_PAGE_SIZE = 12;

    let newsItems = [];
    let currentIndex = 0;
    let slideTimer = null;
    let galleryIntervals = [];
    let videoTextTimer = null;

    async function fetchWithTimeout(url, timeout) {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), timeout);
      try {
        const response = await fetch(url, { signal: controller.signal });
        clearTimeout(timeoutId);
        return response;
      } catch (err) {
        clearTimeout(timeoutId);
        if (err.name === 'AbortError') {
          throw new Error('Request timed out. Please check your connection.');
        }
        throw err;
      }
    }

    async function fetchWithRetry(url, retries = MAX_RETRIES) {
      for (let attempt = 1; attempt <= retries; attempt++) {
        try {
          const response = await fetchWithTimeout(url, FETCH_TIMEOUT);
          if (!response.ok) throw new Error(`API error: ${response.status}`);
          return response;
        } catch (err) {
          console.warn(`Fetch attempt ${attempt}/${retries} failed:`, err.message);
          if (attempt === retries) throw err;
          await new Promise(r => setTimeout(r, 2000 * attempt));
        }
      }
    }

    async function fetchProjects() {
      const response = await fetchWithRetry(PROJECTS_URL);
      const projects = await response.json();
      return projects.map(p => p.id);
    }

    async function fetchNews(projectIds, pageSize = FULL_PAGE_SIZE) {
      const params = new URLSearchParams({
        pageNumber: '0',
        pageSize: String(pageSize),
        sampling: 'true',
        withSupporters: 'true'
      });
      projectIds.forEach(id => params.append('projectIds', id));

      const response = await fetchWithRetry(`${NEWS_URL}?${params}`);
      const result = await response.json();
      return result.data || [];
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const date = new Date(dateStr);
      const now = new Date();
      const diffMs = now - date;
      const diffSec = Math.floor(diffMs / 1000);
      const diffMin = Math.floor(diffSec / 60);
      const diffHr = Math.floor(diffMin / 60);
      const diffDays = Math.floor(diffHr / 24);
      const diffWeeks = Math.floor(diffDays / 7);
      const diffMonths = Math.floor(diffDays / 30);
      const diffYears = Math.floor(diffDays / 365);

      if (diffSec < 60) return 'just now';
      if (diffMin < 60) return diffMin === 1 ? 'a minute ago' : `${diffMin} minutes ago`;
      if (diffHr < 24) return diffHr === 1 ? 'an hour ago' : `${diffHr} hours ago`;
      if (diffDays === 1) return 'yesterday';
      if (diffDays < 7) return `${diffDays} days ago`;
      if (diffWeeks === 1) return 'last week';
      if (diffWeeks < 5) return `${diffWeeks} weeks ago`;
      if (diffMonths === 1) return 'last month';
      if (diffMonths < 12) return `${diffMonths} months ago`;
      if (diffYears === 1) return 'last year';
      return `${diffYears} years ago`;
    }

    function getInitials(name) {
      if (!name) return '?';
      return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
    }

    function hasVideo(item) {
      return !!(item.newsVideo && item.newsVideo.playbackRef);
    }

    function hasImages(item) {
      return item.newsImageUrls && item.newsImageUrls.length > 0;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function buildSlide(item, index) {
      const slide = document.createElement('div');
      slide.className = 'slide';
      slide.dataset.index = index;

      const itemHasVideo = hasVideo(item);
      const itemHasImages = hasImages(item);
      const hasMedia = itemHasVideo || itemHasImages;

      if (!hasMedia) slide.classList.add('no-media');

      let mediaHTML = '';

      if (itemHasVideo) {
        mediaHTML = `
          <div class="slide-media">
            <mux-player
              id="mux-${index}"
              playback-id="${item.newsVideo.playbackRef}"
              muted
              autoplay="false"
              preload="metadata"
              style="width:100%;height:100%;--controls:none;--media-object-fit:cover;"
            ></mux-player>
          </div>`;
      } else if (itemHasImages) {
        const images = item.newsImageUrls.map(url => url + '-large');
        if (images.length === 1) {
          mediaHTML = `
            <div class="slide-media">
              <img src="${images[0]}" alt="News image" loading="lazy">
            </div>`;
        } else {
          const imgsHTML = images.map((url, i) =>
            `<img src="${url}" alt="News image ${i + 1}" class="${i === 0 ? 'gallery-active' : ''}" loading="lazy">`
          ).join('');
          mediaHTML = `
            <div class="slide-media">
              <div class="image-gallery" data-slide="${index}">
                ${imgsHTML}
              </div>
              <div class="gallery-counter" data-gallery-counter="${index}">1 / ${images.length}</div>
            </div>`;
        }
      }

      const partnerName = item.projectPartnerName || 'Sumthing';
      const partnerLogoUrl = item.projectPartnerLogoUrl ? item.projectPartnerLogoUrl + '-large' : null;
      const categoryLabel = item.projectCategory || 'Impact Update';
      const storyTitle = item.storyTitle || '';
      const supporterCount = item.storySupporterCount || 0;

      const partnerAvatar = partnerLogoUrl
        ? `<img class="partner-logo" src="${partnerLogoUrl}" alt="${escapeHtml(partnerName)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="partner-logo-placeholder" style="display:none">${getInitials(partnerName)}</div>`
        : `<div class="partner-logo-placeholder">${getInitials(partnerName)}</div>`;

      const supporterHTML = supporterCount > 0
        ? `<div class="supporter-count">
            <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
            <strong>${supporterCount}</strong> supporters
          </div>`
        : '';

      const overlayHTML = hasMedia ? '<div class="slide-overlay"></div>' : '';

      const contentHTML = `
        ${overlayHTML}
        <div class="slide-content">
          <div class="category-badge">${escapeHtml(categoryLabel)}</div>
          <div class="story-title">${escapeHtml(storyTitle)}</div>
          <div class="partner-row">
            ${partnerAvatar}
            <div class="partner-info">
              <div class="partner-name">${escapeHtml(partnerName)}</div>
              <div class="publish-date">${formatDate(item.newsPublishedAt || item.newsCreatedAt)}</div>
            </div>
          </div>
          <div class="news-text">${escapeHtml(item.newsText || '')}</div>
          ${supporterHTML}
        </div>`;

      slide.innerHTML = mediaHTML + contentHTML;
      return slide;
    }

    function buildIndicators() {
      const container = document.getElementById('indicators');
      container.innerHTML = '';
      newsItems.forEach((_, i) => {
        const dot = document.createElement('div');
        dot.className = 'indicator' + (i === 0 ? ' active' : '');
        dot.addEventListener('click', () => goToSlide(i));
        container.appendChild(dot);
      });
    }

    function updateIndicators() {
      const dots = document.querySelectorAll('.indicator');
      dots.forEach((dot, i) => {
        dot.classList.toggle('active', i === currentIndex);
      });
      document.getElementById('slideCounter').textContent =
        `${currentIndex + 1} / ${newsItems.length}`;
    }

    function startProgress(duration) {
      const bar = document.getElementById('progressBar');
      bar.style.transition = 'none';
      bar.style.width = '0%';
      bar.offsetHeight; // force reflow
      bar.style.transition = `width ${duration}ms linear`;
      bar.style.width = '100%';
    }

    function resetProgress() {
      const bar = document.getElementById('progressBar');
      bar.style.transition = 'none';
      bar.style.width = '0%';
    }

    function startGalleryRotation(slideIndex) {
      const gallery = document.querySelector(`.image-gallery[data-slide="${slideIndex}"]`);
      if (!gallery) return;

      const images = gallery.querySelectorAll('img');
      if (images.length <= 1) return;

      const counter = document.querySelector(`[data-gallery-counter="${slideIndex}"]`);
      let current = 0;

      const interval = setInterval(() => {
        images[current].classList.remove('gallery-active');
        current = (current + 1) % images.length;
        images[current].classList.add('gallery-active');
        if (counter) counter.textContent = `${current + 1} / ${images.length}`;
      }, GALLERY_INTERVAL);

      galleryIntervals.push(interval);
    }

    function clearGalleryIntervals() {
      galleryIntervals.forEach(clearInterval);
      galleryIntervals = [];
    }

    function playVideoSlide(index) {
      const player = document.getElementById(`mux-${index}`);
      if (!player) return false;

      player.muted = true;
      player.currentTime = 0;
      player.play().catch(() => {});

      // Hide text overlay after 10 seconds on video slides
      const slide = player.closest('.slide');
      const content = slide ? slide.querySelector('.slide-content') : null;
      if (content) {
        clearTimeout(videoTextTimer);
        videoTextTimer = setTimeout(() => {
          content.classList.add('video-text-hide');
        }, 10000);
      }

      const onEnded = () => {
        player.removeEventListener('ended', onEnded);
        nextSlide();
      };
      player.addEventListener('ended', onEnded);

      const onLoaded = () => {
        player.removeEventListener('loadedmetadata', onLoaded);
        if (player.duration && isFinite(player.duration)) {
          resetProgress();
          startProgress(player.duration * 1000);
        }
      };
      player.addEventListener('loadedmetadata', onLoaded);
      if (player.duration && isFinite(player.duration)) {
        resetProgress();
        startProgress(player.duration * 1000);
      }

      // Fallback: 5 minute max for any video
      slideTimer = setTimeout(() => nextSlide(), 300000);
      return true;
    }

    function stopVideoSlide(index) {
      const player = document.getElementById(`mux-${index}`);
      if (player) {
        player.pause();
      }
    }

    function goToSlide(index) {
      if (index === currentIndex) return;

      clearTimeout(slideTimer);
      clearTimeout(videoTextTimer);
      clearGalleryIntervals();
      resetProgress();

      const slides = document.querySelectorAll('.slide');
      const currentSlide = slides[currentIndex];
      const nextSlideEl = slides[index];

      stopVideoSlide(currentIndex);

      // Reset video text hide on current slide
      const currentContent = currentSlide.querySelector('.slide-content');
      if (currentContent) currentContent.classList.remove('video-text-hide');

      currentSlide.classList.remove('active');
      currentSlide.classList.add('exiting');

      nextSlideEl.classList.add('active', 'entering');

      setTimeout(() => {
        currentSlide.classList.remove('exiting');
        nextSlideEl.classList.remove('entering');
      }, 800);

      currentIndex = index;
      updateIndicators();
      startSlideTimer();
    }

    function nextSlide() {
      clearTimeout(slideTimer);
      const next = (currentIndex + 1) % newsItems.length;
      goToSlide(next);
    }

    function startSlideTimer() {
      clearTimeout(slideTimer);

      const item = newsItems[currentIndex];

      if (hasVideo(item)) {
        const played = playVideoSlide(currentIndex);
        if (played) return;
      }

      if (hasImages(item) && item.newsImageUrls.length > 1) {
        startGalleryRotation(currentIndex);
      }

      startProgress(SLIDE_DURATION);
      slideTimer = setTimeout(() => nextSlide(), SLIDE_DURATION);
    }

    function renderSlides(items, startIndex) {
      const carousel = document.getElementById('carousel');
      items.forEach((item, i) => {
        const slide = buildSlide(item, startIndex + i);
        if (startIndex === 0 && i === 0) slide.classList.add('active');
        carousel.appendChild(slide);
      });
    }

    async function init() {
      try {
        const projectIds = await fetchProjects();
        if (!projectIds.length) {
          showError('No projects found', 'The projects API returned no results.');
          return;
        }

        const initialItems = await fetchNews(projectIds, INITIAL_PAGE_SIZE);
        if (!initialItems.length) {
          showError('No news items found', 'The API returned no results.');
          return;
        }

        newsItems = initialItems;
        renderSlides(newsItems, 0);
        buildIndicators();
        updateIndicators();
        document.getElementById('loading').classList.add('hidden');
        startSlideTimer();

        if (FULL_PAGE_SIZE > INITIAL_PAGE_SIZE) {
          fetchNews(projectIds, FULL_PAGE_SIZE).then(fullItems => {
            if (fullItems.length <= newsItems.length) return;

            const newItems = fullItems.slice(newsItems.length);
            const startIndex = newsItems.length;
            newsItems = fullItems;
            renderSlides(newItems, startIndex);
            buildIndicators();
            updateIndicators();
            console.log(`Loaded ${newItems.length} additional slides in background`);
          }).catch(err => {
            console.warn('Background fetch for more news failed:', err.message);
          });
        }

      } catch (err) {
        console.error('Failed to load news:', err);
        showError('Failed to load news', err.message);
      }
    }

    function showError(title, message) {
      document.getElementById('loading').classList.add('hidden');
      const errDiv = document.createElement('div');
      errDiv.className = 'error-screen';
      errDiv.innerHTML = `
        <h2>${escapeHtml(title)}</h2>
        <p>${escapeHtml(message)}</p>
        <button onclick="location.reload()">Try Again</button>`;
      document.body.appendChild(errDiv);
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') {
        e.preventDefault();
        nextSlide();
      } else if (e.key === 'ArrowLeft') {
        e.preventDefault();
        const prev = (currentIndex - 1 + newsItems.length) % newsItems.length;
        goToSlide(prev);
      }
    });

    init();
  </script>
</body>
</html>
