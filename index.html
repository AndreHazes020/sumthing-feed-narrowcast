<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sumthing Impact News</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/@mux/mux-player@3/dist/mux-player.css">
  <script defer src="https://unpkg.com/@mux/mux-player@3"></script>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #033532;
      --highlight: #C7F50A;
      --text: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.6);
    }

    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* Loading screen */
    .loading-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      z-index: 1000;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }

    .loading-screen.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255, 255, 255, 0.15);
      border-top-color: var(--highlight);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .loading-text {
      margin-top: 1.5rem;
      font-size: 1.1rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Carousel container */
    .carousel {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* Individual slide */
    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      opacity: 0;
      visibility: hidden;
      transition: none;
    }

    .slide.active {
      opacity: 1;
      visibility: visible;
      z-index: 2;
    }

    .slide.entering {
      animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .slide.exiting {
      animation: slideOut 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      z-index: 1;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(60px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateX(0) scale(1);
      }
    }

    @keyframes slideOut {
      from {
        opacity: 1;
        transform: translateX(0) scale(1);
      }
      to {
        opacity: 0;
        transform: translateX(-60px) scale(0.98);
      }
    }

    /* Media section (left side) */
    .slide-media {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #000;
    }

    .slide-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .slide-media .image-gallery {
      position: absolute;
      inset: 0;
    }

    .slide-media .image-gallery img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 1.2s ease;
    }

    .slide-media .image-gallery img.gallery-active {
      opacity: 1;
    }

    .media-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, transparent 50%, var(--bg) 100%);
      pointer-events: none;
    }

    /* Gallery counter */
    .gallery-counter {
      position: absolute;
      bottom: 16px;
      left: 16px;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      padding: 0.3rem 0.65rem;
      border-radius: 6px;
      font-size: 0.75rem;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      z-index: 5;
    }

    /* Video styles */
    .slide-media mux-player {
      width: 100%;
      height: 100%;
      --controls: none;
      --media-object-fit: cover;
    }

    /* Content section (right side) */
    .slide-content {
      width: 500px;
      min-width: 500px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 4rem 2.5rem 3rem;
      background: var(--bg);
      position: relative;
      overflow-y: auto;
    }

    .slide-content::-webkit-scrollbar {
      width: 4px;
    }

    .slide-content::-webkit-scrollbar-track {
      background: transparent;
    }

    .slide-content::-webkit-scrollbar-thumb {
      background: var(--highlight);
      border-radius: 2px;
    }

    .category-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.35rem 0.85rem;
      background: rgba(199, 245, 10, 0.15);
      color: var(--highlight);
      border: 1px solid rgba(199, 245, 10, 0.3);
      border-radius: 999px;
      font-family: 'Oswald', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 1.25rem;
      width: fit-content;
    }

    .category-badge::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--highlight);
      border-radius: 50%;
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .story-title {
      font-family: 'Oswald', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 1.25rem;
      color: var(--text);
      text-transform: uppercase;
    }

    .partner-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .partner-logo {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--highlight);
      background: #fff;
    }

    .partner-logo-placeholder {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--highlight);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      color: var(--bg);
      border: 2px solid var(--highlight);
      flex-shrink: 0;
    }

    .partner-info {
      display: flex;
      flex-direction: column;
    }

    .partner-name {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text);
    }

    .publish-date {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 0.15rem;
    }

    .news-text {
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      line-height: 1.75;
      color: var(--text);
      margin-bottom: 1.5rem;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .supporter-count {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: auto;
      padding-top: 1rem;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .supporter-count svg {
      width: 16px;
      height: 16px;
      fill: var(--highlight);
    }

    .supporter-count strong {
      color: var(--highlight);
      font-weight: 600;
    }

    /* Progress bar */
    .progress-bar-container {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: rgba(255, 255, 255, 0.08);
      z-index: 100;
    }

    .progress-bar {
      height: 100%;
      background: var(--highlight);
      width: 0%;
      transition: width 0.3s linear;
      border-radius: 0 2px 2px 0;
    }

    /* Slide indicators */
    .slide-indicators {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 100;
    }

    .indicator {
      width: 32px;
      height: 4px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.2);
      transition: all 0.4s ease;
      cursor: pointer;
    }

    .indicator.active {
      background: var(--highlight);
      width: 48px;
    }

    /* Slide counter */
    .slide-counter {
      position: fixed;
      top: 24px;
      right: 32px;
      font-family: 'Oswald', sans-serif;
      font-size: 0.85rem;
      color: var(--text-muted);
      z-index: 100;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* Logo / branding */
    .branding {
      position: fixed;
      top: 24px;
      left: 32px;
      display: flex;
      align-items: center;
      z-index: 100;
    }

    .brand-logo {
      height: 40px;
      width: auto;
    }

    /* Video-only slide: content overlays bottom */
    .slide.video-slide .slide-content {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 500px;
      min-width: 500px;
      height: 100%;
      background: linear-gradient(to left, var(--bg) 85%, transparent 100%);
    }

    .slide.video-slide .slide-media {
      position: absolute;
      inset: 0;
    }

    /* Bottom gradient for text readability over media */
    .slide.video-slide .slide-content::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: -100px;
      right: 0;
      height: 60%;
      background: linear-gradient(to top, var(--bg) 0%, transparent 100%);
      pointer-events: none;
      z-index: -1;
    }

    /* No-media slide: centered text */
    .slide.no-media {
      justify-content: center;
    }

    .slide.no-media .slide-content {
      width: 100%;
      min-width: 100%;
      max-width: 800px;
      margin: 0 auto;
      padding: 4rem 3rem;
    }

    .slide.no-media .slide-media {
      display: none;
    }

    .slide.no-media .news-text {
      font-size: 1.2rem;
    }

    /* Error state */
    .error-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      z-index: 1000;
    }

    .error-screen h2 {
      font-family: 'Oswald', sans-serif;
      font-size: 1.5rem;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      color: var(--text);
    }

    .error-screen p {
      color: var(--text-muted);
      margin-bottom: 1.5rem;
    }

    .error-screen button {
      padding: 0.65rem 1.5rem;
      background: var(--highlight);
      color: var(--bg);
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .error-screen button:hover {
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <div class="loading-screen" id="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading impact updates...</div>
  </div>

  <div class="branding">
    <svg class="brand-logo" viewBox="0 0 440 200" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- S -->
      <path d="M0 18C0 8 8 0 18 0H82C92 0 100 8 100 18V20C100 25 96 28 92 28H28C22 28 18 32 18 38V42C18 48 22 52 28 52H72C82 52 100 60 100 70V82C100 92 92 100 82 100H18C8 100 0 92 0 82V78C0 73 4 70 8 70H72C78 70 82 66 82 60V58C82 52 78 48 72 48H28C8 48 0 40 0 30V18Z" fill="#C7F50A"/>
      <!-- U -->
      <path d="M110 0H128V72C128 82 136 90 146 90H164C174 90 182 82 182 72V0H200V82C200 92 192 100 182 100H128C118 100 110 92 110 82V0Z" fill="#C7F50A"/>
      <!-- M -->
      <path d="M210 0H228L260 50L292 0H310V100H292V36L264 80H256L228 36V100H210V0Z" fill="#C7F50A"/>
      <!-- T -->
      <path d="M0 110H120V128H70V200H50V128H0V110Z" fill="#C7F50A"/>
      <!-- H -->
      <path d="M130 110H148V146H182V110H200V200H182V164H148V200H130V110Z" fill="#C7F50A"/>
      <!-- I -->
      <path d="M210 110H228V200H210V110Z" fill="#C7F50A"/>
      <!-- N -->
      <path d="M240 110H258L310 172V110H328V200H310L258 138V200H240V110Z" fill="#C7F50A"/>
      <!-- G -->
      <path d="M340 118C340 113 345 110 350 110H430C435 110 440 113 440 118V120C440 125 435 128 430 128H358V182H422V164H390V148H440V192C440 197 436 200 430 200H350C345 200 340 197 340 192V118Z" fill="#C7F50A"/>
    </svg>
  </div>

  <div class="slide-counter" id="slideCounter"></div>

  <div class="carousel" id="carousel"></div>

  <div class="slide-indicators" id="indicators"></div>

  <div class="progress-bar-container">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <script>
    const API_BASE = 'https://sumthing-api.com';
    const PROJECTS_URL = `${API_BASE}/v3/projects`;
    const NEWS_URL = `${API_BASE}/v1/stories/news`;
    const SLIDE_DURATION = 10000;
    const GALLERY_INTERVAL = 3500;
    const FETCH_TIMEOUT = 30000;
    const MAX_RETRIES = 3;
    const INITIAL_PAGE_SIZE = 6;
    const FULL_PAGE_SIZE = 24;

    let newsItems = [];
    let currentIndex = 0;
    let slideTimer = null;
    let galleryIntervals = [];

    async function fetchWithTimeout(url, timeout) {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), timeout);
      try {
        const response = await fetch(url, { signal: controller.signal });
        clearTimeout(timeoutId);
        return response;
      } catch (err) {
        clearTimeout(timeoutId);
        if (err.name === 'AbortError') {
          throw new Error('Request timed out. Please check your connection.');
        }
        throw err;
      }
    }

    async function fetchWithRetry(url, retries = MAX_RETRIES) {
      for (let attempt = 1; attempt <= retries; attempt++) {
        try {
          const response = await fetchWithTimeout(url, FETCH_TIMEOUT);
          if (!response.ok) throw new Error(`API error: ${response.status}`);
          return response;
        } catch (err) {
          console.warn(`Fetch attempt ${attempt}/${retries} failed:`, err.message);
          if (attempt === retries) throw err;
          await new Promise(r => setTimeout(r, 2000 * attempt));
        }
      }
    }

    async function fetchProjects() {
      const response = await fetchWithRetry(PROJECTS_URL);
      const projects = await response.json();
      return projects.map(p => p.id);
    }

    async function fetchNews(projectIds, pageSize = FULL_PAGE_SIZE) {
      const params = new URLSearchParams({
        pageNumber: '1',
        pageSize: String(pageSize),
        sampling: 'true',
        withSupporters: 'true'
      });
      projectIds.forEach(id => params.append('projectIds', id));

      const response = await fetchWithRetry(`${NEWS_URL}?${params}`);
      const result = await response.json();
      return result.data || [];
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const date = new Date(dateStr);
      return date.toLocaleDateString('en-US', {
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      });
    }

    function getInitials(name) {
      if (!name) return '?';
      return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
    }

    function hasVideo(item) {
      return !!(item.video && item.video.playbackRef);
    }

    function hasImages(item) {
      return item.imageUrlGallery && item.imageUrlGallery.length > 0;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function buildSlide(item, index) {
      const slide = document.createElement('div');
      slide.className = 'slide';
      slide.dataset.index = index;

      const itemHasVideo = hasVideo(item);
      const itemHasImages = hasImages(item);
      const hasMedia = itemHasVideo || itemHasImages;

      if (!hasMedia) slide.classList.add('no-media');
      if (itemHasVideo) slide.classList.add('video-slide');

      let mediaHTML = '';

      if (itemHasVideo) {
        mediaHTML = `
          <div class="slide-media">
            <mux-player
              id="mux-${index}"
              playback-id="${item.video.playbackRef}"
              muted
              autoplay="false"
              preload="metadata"
              style="width:100%;height:100%;--controls:none;--media-object-fit:cover;"
            ></mux-player>
          </div>`;
      } else if (itemHasImages) {
        const images = item.imageUrlGallery;
        if (images.length === 1) {
          mediaHTML = `
            <div class="slide-media">
              <img src="${images[0]}" alt="News image" loading="lazy">
              <div class="media-overlay"></div>
            </div>`;
        } else {
          const imgsHTML = images.map((url, i) =>
            `<img src="${url}" alt="News image ${i + 1}" class="${i === 0 ? 'gallery-active' : ''}" loading="lazy">`
          ).join('');
          mediaHTML = `
            <div class="slide-media">
              <div class="image-gallery" data-slide="${index}">
                ${imgsHTML}
              </div>
              <div class="gallery-counter" data-gallery-counter="${index}">1 / ${images.length}</div>
              <div class="media-overlay"></div>
            </div>`;
        }
      }

      const authorName = item.author ? item.author.username : 'Sumthing';
      const authorLogo = item.author ? item.author.profileImageUrl : null;

      const partnerAvatar = authorLogo
        ? `<img class="partner-logo" src="${authorLogo}" alt="${escapeHtml(authorName)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="partner-logo-placeholder" style="display:none">${getInitials(authorName)}</div>`
        : `<div class="partner-logo-placeholder">${getInitials(authorName)}</div>`;

      const categoryLabel = item.type || 'Impact Update';

      const contentHTML = `
        <div class="slide-content">
          <div class="category-badge">${escapeHtml(categoryLabel)}</div>
          <div class="story-title">${escapeHtml(authorName)}</div>
          <div class="partner-row">
            ${partnerAvatar}
            <div class="partner-info">
              <div class="partner-name">${escapeHtml(authorName)}</div>
              <div class="publish-date">${formatDate(item.publishedAt || item.createdAt)}</div>
            </div>
          </div>
          <div class="news-text">${escapeHtml(item.text || '')}</div>
        </div>`;

      slide.innerHTML = mediaHTML + contentHTML;
      return slide;
    }

    function buildIndicators() {
      const container = document.getElementById('indicators');
      container.innerHTML = '';
      newsItems.forEach((_, i) => {
        const dot = document.createElement('div');
        dot.className = 'indicator' + (i === 0 ? ' active' : '');
        dot.addEventListener('click', () => goToSlide(i));
        container.appendChild(dot);
      });
    }

    function updateIndicators() {
      const dots = document.querySelectorAll('.indicator');
      dots.forEach((dot, i) => {
        dot.classList.toggle('active', i === currentIndex);
      });
      document.getElementById('slideCounter').textContent =
        `${currentIndex + 1} / ${newsItems.length}`;
    }

    function startProgress(duration) {
      const bar = document.getElementById('progressBar');
      bar.style.transition = 'none';
      bar.style.width = '0%';
      bar.offsetHeight; // force reflow
      bar.style.transition = `width ${duration}ms linear`;
      bar.style.width = '100%';
    }

    function resetProgress() {
      const bar = document.getElementById('progressBar');
      bar.style.transition = 'none';
      bar.style.width = '0%';
    }

    function startGalleryRotation(slideIndex) {
      const gallery = document.querySelector(`.image-gallery[data-slide="${slideIndex}"]`);
      if (!gallery) return;

      const images = gallery.querySelectorAll('img');
      if (images.length <= 1) return;

      const counter = document.querySelector(`[data-gallery-counter="${slideIndex}"]`);
      let current = 0;

      const interval = setInterval(() => {
        images[current].classList.remove('gallery-active');
        current = (current + 1) % images.length;
        images[current].classList.add('gallery-active');
        if (counter) counter.textContent = `${current + 1} / ${images.length}`;
      }, GALLERY_INTERVAL);

      galleryIntervals.push(interval);
    }

    function clearGalleryIntervals() {
      galleryIntervals.forEach(clearInterval);
      galleryIntervals = [];
    }

    function playVideoSlide(index) {
      const player = document.getElementById(`mux-${index}`);
      if (!player) return false;

      player.muted = true;
      player.currentTime = 0;
      player.play().catch(() => {});

      const onEnded = () => {
        player.removeEventListener('ended', onEnded);
        nextSlide();
      };
      player.addEventListener('ended', onEnded);

      // Update progress bar when duration is known
      const onLoaded = () => {
        player.removeEventListener('loadedmetadata', onLoaded);
        if (player.duration && isFinite(player.duration)) {
          resetProgress();
          startProgress(player.duration * 1000);
        }
      };
      player.addEventListener('loadedmetadata', onLoaded);
      // In case metadata is already loaded
      if (player.duration && isFinite(player.duration)) {
        resetProgress();
        startProgress(player.duration * 1000);
      }

      // Fallback: 5 minute max for any video
      slideTimer = setTimeout(() => nextSlide(), 300000);
      return true;
    }

    function stopVideoSlide(index) {
      const player = document.getElementById(`mux-${index}`);
      if (player) {
        player.pause();
      }
    }

    function goToSlide(index) {
      if (index === currentIndex) return;

      clearTimeout(slideTimer);
      clearGalleryIntervals();
      resetProgress();

      const slides = document.querySelectorAll('.slide');
      const currentSlide = slides[currentIndex];
      const nextSlideEl = slides[index];

      stopVideoSlide(currentIndex);

      currentSlide.classList.remove('active');
      currentSlide.classList.add('exiting');

      nextSlideEl.classList.add('active', 'entering');

      setTimeout(() => {
        currentSlide.classList.remove('exiting');
        nextSlideEl.classList.remove('entering');
      }, 800);

      currentIndex = index;
      updateIndicators();
      startSlideTimer();
    }

    function nextSlide() {
      clearTimeout(slideTimer);
      const next = (currentIndex + 1) % newsItems.length;
      goToSlide(next);
    }

    function startSlideTimer() {
      clearTimeout(slideTimer);

      const item = newsItems[currentIndex];

      if (hasVideo(item)) {
        const played = playVideoSlide(currentIndex);
        if (played) return;
      }

      if (hasImages(item) && item.imageUrlGallery.length > 1) {
        startGalleryRotation(currentIndex);
      }

      startProgress(SLIDE_DURATION);
      slideTimer = setTimeout(() => nextSlide(), SLIDE_DURATION);
    }

    function renderSlides(items, startIndex) {
      const carousel = document.getElementById('carousel');
      items.forEach((item, i) => {
        const slide = buildSlide(item, startIndex + i);
        if (startIndex === 0 && i === 0) slide.classList.add('active');
        carousel.appendChild(slide);
      });
    }

    async function init() {
      try {
        // Step 1: Fetch projects (lightweight call)
        const projectIds = await fetchProjects();
        if (!projectIds.length) {
          showError('No projects found', 'The projects API returned no results.');
          return;
        }

        // Step 2: Fetch initial small batch of news to show quickly
        const initialItems = await fetchNews(projectIds, INITIAL_PAGE_SIZE);
        if (!initialItems.length) {
          showError('No news items found', 'The API returned no results.');
          return;
        }

        // Show initial slides immediately
        newsItems = initialItems;
        renderSlides(newsItems, 0);
        buildIndicators();
        updateIndicators();
        document.getElementById('loading').classList.add('hidden');
        startSlideTimer();

        // Step 3: Fetch full set in the background
        if (FULL_PAGE_SIZE > INITIAL_PAGE_SIZE) {
          fetchNews(projectIds, FULL_PAGE_SIZE).then(fullItems => {
            if (fullItems.length <= newsItems.length) return;

            const newItems = fullItems.slice(newsItems.length);
            const startIndex = newsItems.length;
            newsItems = fullItems;
            renderSlides(newItems, startIndex);
            buildIndicators();
            updateIndicators();
            console.log(`Loaded ${newItems.length} additional slides in background`);
          }).catch(err => {
            console.warn('Background fetch for more news failed:', err.message);
          });
        }

      } catch (err) {
        console.error('Failed to load news:', err);
        showError('Failed to load news', err.message);
      }
    }

    function showError(title, message) {
      document.getElementById('loading').classList.add('hidden');
      const errDiv = document.createElement('div');
      errDiv.className = 'error-screen';
      errDiv.innerHTML = `
        <h2>${escapeHtml(title)}</h2>
        <p>${escapeHtml(message)}</p>
        <button onclick="location.reload()">Try Again</button>`;
      document.body.appendChild(errDiv);
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') {
        e.preventDefault();
        nextSlide();
      } else if (e.key === 'ArrowLeft') {
        e.preventDefault();
        const prev = (currentIndex - 1 + newsItems.length) % newsItems.length;
        goToSlide(prev);
      }
    });

    init();
  </script>
</body>
