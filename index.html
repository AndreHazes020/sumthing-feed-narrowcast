<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sumthing Impact News</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/@mux/mux-player@3/dist/mux-player.css">
  <script defer src="https://unpkg.com/@mux/mux-player@3"></script>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #0ea573;
      --primary-light: #34d399;
      --dark: #0f172a;
      --dark-card: #1e293b;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --accent: #38bdf8;
    }

    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: var(--dark);
      color: var(--text);
    }

    /* Loading screen */
    .loading-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--dark);
      z-index: 1000;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }

    .loading-screen.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 4px solid var(--dark-card);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .loading-text {
      margin-top: 1.5rem;
      font-size: 1.1rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Carousel container */
    .carousel {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* Individual slide */
    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      opacity: 0;
      visibility: hidden;
      transition: none;
    }

    .slide.active {
      opacity: 1;
      visibility: visible;
      z-index: 2;
    }

    .slide.entering {
      animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .slide.exiting {
      animation: slideOut 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      z-index: 1;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(60px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateX(0) scale(1);
      }
    }

    @keyframes slideOut {
      from {
        opacity: 1;
        transform: translateX(0) scale(1);
      }
      to {
        opacity: 0;
        transform: translateX(-60px) scale(0.98);
      }
    }

    /* Media section (left side) */
    .slide-media {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #000;
    }

    .slide-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .slide-media .image-gallery {
      position: absolute;
      inset: 0;
    }

    .slide-media .image-gallery img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 1.2s ease;
    }

    .slide-media .image-gallery img.gallery-active {
      opacity: 1;
    }

    .media-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, transparent 60%, var(--dark) 100%);
      pointer-events: none;
    }

    /* Gallery counter */
    .gallery-counter {
      position: absolute;
      bottom: 16px;
      left: 16px;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      padding: 0.3rem 0.65rem;
      border-radius: 6px;
      font-size: 0.75rem;
      color: #fff;
      font-weight: 500;
      z-index: 5;
    }

    /* Video styles */
    .slide-media mux-player {
      width: 100%;
      height: 100%;
      --controls: none;
      --media-object-fit: cover;
    }

    /* Content section (right side) */
    .slide-content {
      width: 500px;
      min-width: 500px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 4rem 2.5rem 3rem;
      background: var(--dark);
      position: relative;
      overflow-y: auto;
    }

    .slide-content::-webkit-scrollbar {
      width: 4px;
    }

    .slide-content::-webkit-scrollbar-track {
      background: transparent;
    }

    .slide-content::-webkit-scrollbar-thumb {
      background: var(--primary);
      border-radius: 2px;
    }

    .category-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.35rem 0.85rem;
      background: rgba(14, 165, 115, 0.15);
      color: var(--primary-light);
      border: 1px solid rgba(14, 165, 115, 0.3);
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 1.25rem;
      width: fit-content;
    }

    .category-badge::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--primary-light);
      border-radius: 50%;
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .story-title {
      font-size: 1.3rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 1.25rem;
      color: var(--text);
    }

    .partner-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .partner-logo {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--primary);
      background: #fff;
    }

    .partner-logo-placeholder {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1rem;
      color: #fff;
      border: 2px solid var(--primary);
      flex-shrink: 0;
    }

    .partner-info {
      display: flex;
      flex-direction: column;
    }

    .partner-name {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text);
    }

    .publish-date {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 0.15rem;
    }

    .news-text {
      font-size: 1rem;
      line-height: 1.75;
      color: var(--text);
      margin-bottom: 1.5rem;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .supporter-count {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: auto;
      padding-top: 1rem;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .supporter-count svg {
      width: 16px;
      height: 16px;
      fill: var(--primary-light);
    }

    .supporter-count strong {
      color: var(--primary-light);
      font-weight: 600;
    }

    /* Progress bar */
    .progress-bar-container {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: rgba(255, 255, 255, 0.08);
      z-index: 100;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      width: 0%;
      transition: width 0.3s linear;
      border-radius: 0 2px 2px 0;
    }

    /* Slide indicators */
    .slide-indicators {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 100;
    }

    .indicator {
      width: 32px;
      height: 4px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.2);
      transition: all 0.4s ease;
      cursor: pointer;
    }

    .indicator.active {
      background: var(--primary);
      width: 48px;
    }

    /* Slide counter */
    .slide-counter {
      position: fixed;
      top: 24px;
      right: 32px;
      font-size: 0.85rem;
      color: var(--text-muted);
      z-index: 100;
      font-weight: 500;
      letter-spacing: 0.05em;
    }

    /* Logo / branding */
    .branding {
      position: fixed;
      top: 24px;
      left: 32px;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      z-index: 100;
    }

    .brand-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-icon svg {
      width: 18px;
      height: 18px;
      fill: #fff;
    }

    .brand-text {
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: -0.01em;
    }

    .brand-text span {
      color: var(--primary-light);
    }

    /* Video-only slide: content overlays bottom */
    .slide.video-slide .slide-content {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 500px;
      min-width: 500px;
      height: 100%;
      background: linear-gradient(to left, var(--dark) 85%, transparent 100%);
    }

    .slide.video-slide .slide-media {
      position: absolute;
      inset: 0;
    }

    /* No-media slide: centered text */
    .slide.no-media {
      justify-content: center;
    }

    .slide.no-media .slide-content {
      width: 100%;
      min-width: 100%;
      max-width: 800px;
      margin: 0 auto;
      padding: 4rem 3rem;
    }

    .slide.no-media .slide-media {
      display: none;
    }

    .slide.no-media .news-text {
      font-size: 1.2rem;
    }

    /* Error state */
    .error-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--dark);
      z-index: 1000;
    }

    .error-screen h2 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }

    .error-screen p {
      color: var(--text-muted);
      margin-bottom: 1.5rem;
    }

    .error-screen button {
      padding: 0.65rem 1.5rem;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .error-screen button:hover {
      background: var(--primary-light);
    }
  </style>
</head>
<body>
  <div class="loading-screen" id="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading impact updates...</div>
  </div>

  <div class="branding">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <div class="brand-text">sum<span>thing</span> Impact</div>
  </div>

  <div class="slide-counter" id="slideCounter"></div>

  <div class="carousel" id="carousel"></div>

  <div class="slide-indicators" id="indicators"></div>

  <div class="progress-bar-container">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <script>
    const API_URL = 'https://sumthing-api.com/v2/news';
    const SLIDE_DURATION = 10000;
    const GALLERY_INTERVAL = 3500;

    let newsItems = [];
    let currentIndex = 0;
    let slideTimer = null;
    let galleryIntervals = [];

    async function fetchNews() {
      const params = new URLSearchParams({
        pageNumber: '1',
        pageSize: '10'
      });

      const response = await fetch(`${API_URL}?${params}`);
      if (!response.ok) throw new Error(`API error: ${response.status}`);

      const result = await response.json();
      return result.data || [];
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const date = new Date(dateStr);
      return date.toLocaleDateString('en-US', {
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      });
    }

    function getInitials(name) {
      if (!name) return '?';
      return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
    }

    function hasVideo(item) {
      return !!(item.newsVideo && item.newsVideo.playbackRef);
    }

    function hasImages(item) {
      return item.newsImageUrls && item.newsImageUrls.length > 0;
    }

    function getLargeImageUrl(url) {
      return url + '-large';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function buildSlide(item, index) {
      const slide = document.createElement('div');
      slide.className = 'slide';
      slide.dataset.index = index;

      const itemHasVideo = hasVideo(item);
      const itemHasImages = hasImages(item);
      const hasMedia = itemHasVideo || itemHasImages;

      if (!hasMedia) slide.classList.add('no-media');
      if (itemHasVideo) slide.classList.add('video-slide');

      let mediaHTML = '';

      if (itemHasVideo) {
        mediaHTML = `
          <div class="slide-media">
            <mux-player
              id="mux-${index}"
              playback-id="${item.newsVideo.playbackRef}"
              muted
              autoplay="false"
              preload="metadata"
              style="width:100%;height:100%;--controls:none;--media-object-fit:cover;"
            ></mux-player>
          </div>`;
      } else if (itemHasImages) {
        const images = item.newsImageUrls;
        if (images.length === 1) {
          mediaHTML = `
            <div class="slide-media">
              <img src="${getLargeImageUrl(images[0])}" alt="News image" loading="lazy">
              <div class="media-overlay"></div>
            </div>`;
        } else {
          const imgsHTML = images.map((url, i) =>
            `<img src="${getLargeImageUrl(url)}" alt="News image ${i + 1}" class="${i === 0 ? 'gallery-active' : ''}" loading="lazy">`
          ).join('');
          mediaHTML = `
            <div class="slide-media">
              <div class="image-gallery" data-slide="${index}">
                ${imgsHTML}
              </div>
              <div class="gallery-counter" data-gallery-counter="${index}">1 / ${images.length}</div>
              <div class="media-overlay"></div>
            </div>`;
        }
      }

      const partnerAvatar = item.projectPartnerLogoUrl
        ? `<img class="partner-logo" src="${item.projectPartnerLogoUrl}" alt="${escapeHtml(item.projectPartnerName || '')}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="partner-logo-placeholder" style="display:none">${getInitials(item.projectPartnerName)}</div>`
        : `<div class="partner-logo-placeholder">${getInitials(item.projectPartnerName)}</div>`;

      const categoryLabel = item.projectCategory || 'Impact Update';
      const supporterCount = item.storySupporterCount || 0;

      const contentHTML = `
        <div class="slide-content">
          <div class="category-badge">${escapeHtml(categoryLabel)}</div>
          ${item.storyTitle ? `<div class="story-title">${escapeHtml(item.storyTitle)}</div>` : ''}
          <div class="partner-row">
            ${partnerAvatar}
            <div class="partner-info">
              <div class="partner-name">${escapeHtml(item.projectPartnerName || 'Sumthing')}</div>
              <div class="publish-date">${formatDate(item.newsPublishedAt || item.newsCreatedAt)}</div>
            </div>
          </div>
          <div class="news-text">${escapeHtml(item.newsText || '')}</div>
          ${supporterCount > 0 ? `
          <div class="supporter-count">
            <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
            <strong>${supporterCount}</strong> supporters in this story
          </div>` : ''}
        </div>`;

      slide.innerHTML = mediaHTML + contentHTML;
      return slide;
    }

    function buildIndicators() {
      const container = document.getElementById('indicators');
      container.innerHTML = '';
      newsItems.forEach((_, i) => {
        const dot = document.createElement('div');
        dot.className = 'indicator' + (i === 0 ? ' active' : '');
        dot.addEventListener('click', () => goToSlide(i));
        container.appendChild(dot);
      });
    }

    function updateIndicators() {
      const dots = document.querySelectorAll('.indicator');
      dots.forEach((dot, i) => {
        dot.classList.toggle('active', i === currentIndex);
      });
      document.getElementById('slideCounter').textContent =
        `${currentIndex + 1} / ${newsItems.length}`;
    }

    function startProgress(duration) {
      const bar = document.getElementById('progressBar');
      bar.style.transition = 'none';
      bar.style.width = '0%';
      bar.offsetHeight; // force reflow
      bar.style.transition = `width ${duration}ms linear`;
      bar.style.width = '100%';
    }

    function resetProgress() {
      const bar = document.getElementById('progressBar');
      bar.style.transition = 'none';
      bar.style.width = '0%';
    }

    function startGalleryRotation(slideIndex) {
      const gallery = document.querySelector(`.image-gallery[data-slide="${slideIndex}"]`);
      if (!gallery) return;

      const images = gallery.querySelectorAll('img');
      if (images.length <= 1) return;

      const counter = document.querySelector(`[data-gallery-counter="${slideIndex}"]`);
      let current = 0;

      const interval = setInterval(() => {
        images[current].classList.remove('gallery-active');
        current = (current + 1) % images.length;
        images[current].classList.add('gallery-active');
        if (counter) counter.textContent = `${current + 1} / ${images.length}`;
      }, GALLERY_INTERVAL);

      galleryIntervals.push(interval);
    }

    function clearGalleryIntervals() {
      galleryIntervals.forEach(clearInterval);
      galleryIntervals = [];
    }

    function playVideoSlide(index) {
      const player = document.getElementById(`mux-${index}`);
      if (!player) return false;

      player.muted = true;
      player.currentTime = 0;
      player.play().catch(() => {});

      const onEnded = () => {
        player.removeEventListener('ended', onEnded);
        nextSlide();
      };
      player.addEventListener('ended', onEnded);

      // Update progress bar when duration is known
      const onLoaded = () => {
        player.removeEventListener('loadedmetadata', onLoaded);
        if (player.duration && isFinite(player.duration)) {
          resetProgress();
          startProgress(player.duration * 1000);
        }
      };
      player.addEventListener('loadedmetadata', onLoaded);
      // In case metadata is already loaded
      if (player.duration && isFinite(player.duration)) {
        resetProgress();
        startProgress(player.duration * 1000);
      }

      // Fallback: 5 minute max for any video
      slideTimer = setTimeout(() => nextSlide(), 300000);
      return true;
    }

    function stopVideoSlide(index) {
      const player = document.getElementById(`mux-${index}`);
      if (player) {
        player.pause();
      }
    }

    function goToSlide(index) {
      if (index === currentIndex) return;

      clearTimeout(slideTimer);
      clearGalleryIntervals();
      resetProgress();

      const slides = document.querySelectorAll('.slide');
      const currentSlide = slides[currentIndex];
      const nextSlideEl = slides[index];

      stopVideoSlide(currentIndex);

      currentSlide.classList.remove('active');
      currentSlide.classList.add('exiting');

      nextSlideEl.classList.add('active', 'entering');

      setTimeout(() => {
        currentSlide.classList.remove('exiting');
        nextSlideEl.classList.remove('entering');
      }, 800);

      currentIndex = index;
      updateIndicators();
      startSlideTimer();
    }

    function nextSlide() {
      clearTimeout(slideTimer);
      const next = (currentIndex + 1) % newsItems.length;
      goToSlide(next);
    }

    function startSlideTimer() {
      clearTimeout(slideTimer);

      const item = newsItems[currentIndex];

      if (hasVideo(item)) {
        const played = playVideoSlide(currentIndex);
        if (played) return;
      }

      if (hasImages(item) && item.newsImageUrls.length > 1) {
        startGalleryRotation(currentIndex);
      }

      startProgress(SLIDE_DURATION);
      slideTimer = setTimeout(() => nextSlide(), SLIDE_DURATION);
    }

    async function init() {
      try {
        newsItems = await fetchNews();

        if (!newsItems.length) {
          showError('No news items found', 'The API returned no results.');
          return;
        }

        const carousel = document.getElementById('carousel');
        newsItems.forEach((item, i) => {
          const slide = buildSlide(item, i);
          if (i === 0) slide.classList.add('active');
          carousel.appendChild(slide);
        });

        buildIndicators();
        updateIndicators();

        document.getElementById('loading').classList.add('hidden');
        startSlideTimer();

      } catch (err) {
        console.error('Failed to load news:', err);
        showError('Failed to load news', err.message);
      }
    }

    function showError(title, message) {
      document.getElementById('loading').classList.add('hidden');
      const errDiv = document.createElement('div');
      errDiv.className = 'error-screen';
      errDiv.innerHTML = `
        <h2>${escapeHtml(title)}</h2>
        <p>${escapeHtml(message)}</p>
        <button onclick="location.reload()">Try Again</button>`;
      document.body.appendChild(errDiv);
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') {
        e.preventDefault();
        nextSlide();
      } else if (e.key === 'ArrowLeft') {
        e.preventDefault();
        const prev = (currentIndex - 1 + newsItems.length) % newsItems.length;
        goToSlide(prev);
      }
    });

    init();
  </script>
</body>
</html>
